name: Terraform Manual Deployment

on:
  workflow_dispatch:
    inputs:
      terraform-version:
        description: "Terraform Version"
        required: true
        default: "1.8.0"
      auto-apply:
        description: "Automatically run terraform apply after plan (true/false)"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ github.event.inputs['terraform-version'] }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS Access
        run: aws sts get-caller-identity

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: environments/dev
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform Plan (write binary)
        working-directory: environments/dev
        run: terraform plan -input=false -out=tfplan.binary

      - name: Show Plan (human-readable)
        working-directory: environments/dev
        run: terraform show -no-color tfplan.binary

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: environments/dev/tfplan.binary

  apply:
    name: Apply (optional)
    runs-on: ubuntu-latest
    needs: validate-and-plan
    if: ${{ github.event.inputs['auto-apply'] == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ github.event.inputs['terraform-version'] }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: environments/dev

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -input=false tfplan.binary
